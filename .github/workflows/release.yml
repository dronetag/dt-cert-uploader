name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  tag:
    name: Create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

  build:
    name: Build — ${{ matrix.name }}
    needs: tag        # wait for tag before building
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------------
          # Linux — oldest supported Ubuntu for maximum glibc compat
          # ----------------------------------------------------------------
          - name: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cli_artifact: dt-cert-uploader-cli
            gui_artifact: dt-cert-uploader-gui
            archive_ext: tar.gz

          # ----------------------------------------------------------------
          # macOS — universal binary (Apple Silicon + Intel)
          # ----------------------------------------------------------------
          - name: macOS aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            cli_artifact: dt-cert-uploader-cli
            gui_artifact: dt-cert-uploader-gui
            archive_ext: tar.gz

          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            cli_artifact: dt-cert-uploader-cli
            gui_artifact: dt-cert-uploader-gui
            archive_ext: tar.gz

          # ----------------------------------------------------------------
          # Windows
          # ----------------------------------------------------------------
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cli_artifact: dt-cert-uploader-cli.exe
            gui_artifact: dt-cert-uploader-gui.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # --- Linux system dependencies for egui ---
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libwayland-client0 \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            pkg-config

      # --- Build CLI ---
      - name: Build CLI
        run: cargo build -p dt-cert-uploader-cli --release --target ${{ matrix.target }}

      # --- Build GUI ---
      - name: Build GUI
        run: cargo build -p dt-cert-uploader-gui --release --target ${{ matrix.target }}

      # --- Package (tar.gz for Linux/macOS, zip for Windows) ---
      - name: Package (Linux / macOS)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.cli_artifact }} dist/
          cp target/${{ matrix.target }}/release/${{ matrix.gui_artifact }} dist/
          cd dist
          tar -czf ../dt-cert-uploader-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.cli_artifact }} dist/
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.gui_artifact }} dist/
          Compress-Archive -Path dist/* -DestinationPath dt-cert-uploader-${{ matrix.target }}.zip

      # --- Upload build artifact to GitHub ---
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: dt-cert-uploader-${{ matrix.target }}
          path: dt-cert-uploader-${{ matrix.target }}.${{ matrix.archive_ext }}

  # --------------------------------------------------------------------------
  # Create a GitHub Release and attach all archives when triggered by a tag
  # --------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: artifacts/*
          generate_release_notes: true